name: Build and Publish

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: wa-proxy-ros-publish
  cancel-in-progress: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PACKAGE_OWNER: medium1992
      PACKAGE_NAME: wa-proxy-ros
      PACKAGE_NAME_ENCODED: wa-proxy-ros
      DELETE_UNTAGGED: "true"

    steps:
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get latest upstream ref
        id: latest_versions
        run: |
          set -euo pipefail
          RELEASE_TAG=$(curl -fsSL https://api.github.com/repos/WhatsApp/proxy/releases/latest | jq -r '.tag_name // empty')
          if [ -n "${RELEASE_TAG}" ] && [ "${RELEASE_TAG}" != "null" ]; then
            UPSTREAM_REF="${RELEASE_TAG}"
          else
            UPSTREAM_REF=$(git ls-remote --tags --sort='-version:refname' https://github.com/WhatsApp/proxy.git 'whatsapp-proxy-chart-*' | head -n1 | awk -F'/' '{print $3}')
            if [ -z "${UPSTREAM_REF}" ]; then
              UPSTREAM_REF="main"
            fi
          fi
          echo "whatsapp_proxy=${UPSTREAM_REF}" >> "$GITHUB_ENV"
          echo "whatsapp_proxy=${UPSTREAM_REF}" >> "$GITHUB_OUTPUT"

      - name: Compare with VERSIONS
        id: check_versions
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run -> force build"
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f VERSIONS ]; then
            echo "No VERSIONS file, build needed"
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT=$(awk -F= '/^whatsapp_proxy=/{print $2}' VERSIONS | tr -d '\r\n' || true)
          if [ "${CURRENT}" != "${whatsapp_proxy}" ]; then
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update VERSIONS
        if: steps.check_versions.outputs.build_needed == 'true'
        run: |
          echo "whatsapp_proxy=${{ steps.latest_versions.outputs.whatsapp_proxy }}" > VERSIONS

      - name: Set up QEMU
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Login to GitHub Container Registry
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch
        if: steps.check_versions.outputs.build_needed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            UPSTREAM_REF=${{ steps.latest_versions.outputs.whatsapp_proxy }}
          tags: |
            ghcr.io/${{ env.PACKAGE_OWNER }}/${{ env.PACKAGE_NAME }}:${{ steps.latest_versions.outputs.whatsapp_proxy }}
            ghcr.io/${{ env.PACKAGE_OWNER }}/${{ env.PACKAGE_NAME }}:latest
            ${{ env.PACKAGE_OWNER }}/${{ env.PACKAGE_NAME }}:${{ steps.latest_versions.outputs.whatsapp_proxy }}
            ${{ env.PACKAGE_OWNER }}/${{ env.PACKAGE_NAME }}:latest

      - name: Publish container archives to Telegram
        if: steps.check_versions.outputs.build_needed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          IMAGE_REPO: medium1992/wa-proxy-ros
          IMAGE_VERSION: ${{ steps.latest_versions.outputs.whatsapp_proxy }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are not configured, skipping Telegram publish."
            exit 0
          fi

          telegram_api() {
            local method="$1"
            shift

            response=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/${method}" "$@")
            echo "$response" | grep -q '"ok":true' || {
              echo "Telegram API call failed:"
              echo "$response"
              exit 1
            }
          }

          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              "$@" && return 0
              echo "Attempt ${attempt} failed, retrying..."
              sleep 10
            done
            "$@"
          }

          thread_data_args=()
          thread_form_args=()
          if [ -n "${TELEGRAM_THREAD_ID}" ]; then
            thread_data_args=(-d "message_thread_id=${TELEGRAM_THREAD_ID}")
            thread_form_args=(-F "message_thread_id=${TELEGRAM_THREAD_ID}")
          fi

          mkdir -p telegram-images

          export_image() {
            local name="$1"
            local platform="$2"
            local image="$3"
            local file="telegram-images/wa-proxy-ros-${name}-${IMAGE_VERSION}.tar.gz"

            retry docker pull --platform "${platform}" "${image}"
            docker save "${image}" | gzip -9 > "${file}"
            docker image rm "${image}" || true
          }

          export_image "amd64" "linux/amd64" "${IMAGE_REPO}:${IMAGE_VERSION}"
          export_image "arm64" "linux/arm64" "${IMAGE_REPO}:${IMAGE_VERSION}"
          export_image "armv7" "linux/arm/v7" "${IMAGE_REPO}:${IMAGE_VERSION}"

          sha256sum telegram-images/*.tar.gz > telegram-images/sha256sums.txt

          files_list=$(find telegram-images -maxdepth 1 -name '*.tar.gz' -type f -printf '%f\n' | sort)
          message=$(printf 'WA Proxy ROS container images\n\nupstream: %s\n\nDocker Hub: https://hub.docker.com/r/%s\n\nFiles:\n%s\n\nChecksums: sha256sums.txt' \
            "${IMAGE_VERSION}" \
            "${IMAGE_REPO}" \
            "${files_list}")

          telegram_api sendMessage \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            "${thread_data_args[@]}" \
            --data-urlencode "text=${message}"

          while IFS= read -r file; do
            telegram_api sendDocument \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              "${thread_form_args[@]}" \
              -F "document=@${file}" \
              -F "caption=$(basename "$file")"
          done < <(find telegram-images -maxdepth 1 -name '*.tar.gz' -type f | sort)

          telegram_api sendDocument \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            "${thread_form_args[@]}" \
            -F "document=@telegram-images/sha256sums.txt" \
            -F "caption=sha256sums.txt"

      - name: Commit and push VERSIONS
        if: steps.check_versions.outputs.build_needed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add VERSIONS
          git commit -m "Auto-update: VERSIONS (${{ steps.latest_versions.outputs.whatsapp_proxy }})" || exit 0
          git push

      - name: Install crane
        if: steps.check_versions.outputs.build_needed == 'true'
        run: |
          curl -sL https://github.com/google/go-containerregistry/releases/download/v0.20.2/go-containerregistry_Linux_x86_64.tar.gz | sudo tar -C /usr/local/bin -xz crane
          chmod +x /usr/local/bin/crane
          crane version

      - name: Log in to GHCR with crane
        if: steps.check_versions.outputs.build_needed == 'true'
        run: echo "${GITHUB_TOKEN}" | crane auth login ghcr.io -u "${PACKAGE_OWNER}" --password-stdin

      - name: Analyze GHCR packages
        if: steps.check_versions.outputs.build_needed == 'true'
        id: analyze
        run: |
          set -euo pipefail

          page=1
          packages_json="[]"
          last_first_id=""

          while true; do
            chunk=$(timeout 30s gh api -H "Accept: application/vnd.github+json" \
              "/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME_ENCODED}/versions?per_page=100&page=${page}" || echo "TIMEOUT")
            if [ "${chunk}" = "TIMEOUT" ]; then
              echo "gh api timed out on page ${page}"
              exit 1
            fi

            chunk_count=$(echo "${chunk}" | jq length)
            if [ "${chunk_count}" -eq 0 ]; then
              break
            fi

            first_id=$(echo "${chunk}" | jq -r '.[0].id // ""')
            if [ -n "${last_first_id}" ] && [ "${first_id}" = "${last_first_id}" ]; then
              break
            fi
            last_first_id="${first_id}"

            packages_json=$(jq -s '.[0] + .[1]' <(echo "${packages_json}") <(echo "${chunk}"))
            page=$((page + 1))
            if [ "${page}" -gt 10 ]; then
              break
            fi
          done

          declare -A protected_digests
          declare -A manifest_seen

          while IFS=$'\t' read -r id digest tags; do
            [ -n "${id}" ] || continue
            protected_digests["${digest}"]=1

            if [ -z "${manifest_seen[$digest]+x}" ]; then
              manifest_seen["${digest}"]=1
              manifest_json=$(timeout 10s crane manifest "ghcr.io/${PACKAGE_OWNER}/${PACKAGE_NAME}@${digest}" 2>/dev/null || echo "{}")
              while IFS= read -r child_digest; do
                [ -n "${child_digest}" ] || continue
                protected_digests["${child_digest}"]=1
              done < <(echo "${manifest_json}" | jq -r '(.manifests // [])[].digest // empty')
            fi

            echo "Protected tagged manifest ${digest} (${tags})"
          done < <(echo "${packages_json}" | jq -r '
            .[] | select((.metadata.container.tags // []) | length > 0) |
            [ .id,
              .name,
              ((.metadata.container.tags // []) | join(", "))
            ] | @tsv')

          safe_untagged_ids=()
          while IFS=$'\t' read -r id digest created media_type; do
            [ -n "${id}" ] || continue
            if [ -n "${protected_digests[$digest]+x}" ]; then
              echo "Skip referenced untagged version ${id} (${digest})"
            else
              echo "Delete candidate ${id} (${digest}, ${created}, ${media_type})"
              safe_untagged_ids+=("${id}")
            fi
          done < <(echo "${packages_json}" | jq -r '
            .[] | select((.metadata.container.tags // []) | length == 0) |
            [ .id,
              (.name // "unknown"),
              (.created_at // "unknown"),
              (.metadata.container.manifest.mediaType // "unknown")
            ] | @tsv')

          if [ "${#safe_untagged_ids[@]}" -eq 0 ]; then
            echo "safe_untagged_ids_comma=" >> "$GITHUB_OUTPUT"
          else
            safe_untagged_ids_comma=$(IFS=,; echo "${safe_untagged_ids[*]}")
            echo "safe_untagged_ids_comma=${safe_untagged_ids_comma}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cleanup untagged GHCR versions
        if: env.DELETE_UNTAGGED == 'true' && steps.analyze.outputs.safe_untagged_ids_comma != ''
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ env.PACKAGE_NAME }}
          package-type: container
          package-version-ids: ${{ steps.analyze.outputs.safe_untagged_ids_comma }}
          token: ${{ env.GITHUB_TOKEN }}
